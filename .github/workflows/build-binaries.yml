name: Build Testbeta Binaries

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            binary_suffix: ""
          - os: windows-latest
            label: windows-amd64
            binary_suffix: .exe
          - os: macos-14
            label: macos-arm64
            binary_suffix: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          # Build all available binary targets
          # See src/Cargo.toml for available [[bin]] sections
          cargo build --release --locked -p synergy-testbeta \
            --bin synergy-testbeta \
            --bin generate-node-keys \
            --bin synergy-address-engine \
            --bin wallet-pqc-cli \
            --bin synergy-rpc-gateway-node \
            --bin synergy-indexer-and-explorer-node

      - name: Package binaries
        id: package
        shell: bash
        env:
          MATRIX_LABEL: ${{ matrix.label }}
          MATRIX_SUFFIX: ${{ matrix.binary_suffix }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p dist
          python3 <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import shutil

          label = os.environ["MATRIX_LABEL"]
          suffix = os.environ["MATRIX_SUFFIX"]
          repo = os.environ["GITHUB_REPOSITORY"]
          ref_name = os.environ.get("GITHUB_REF_NAME") or os.environ["GITHUB_SHA"]
          event_name = os.environ["GITHUB_EVENT_NAME"]

          # Available binaries (matching src/Cargo.toml [[bin]] sections)
          binaries = [
              "synergy-testbeta",
              "generate-node-keys",
              "synergy-address-engine",
              "wallet-pqc-cli",
              "synergy-rpc-gateway-node",
              "synergy-indexer-and-explorer-node",
          ]

          dist = pathlib.Path("dist")
          target = pathlib.Path("target") / "release"

          binaries_info = {}
          base_url = (
              f"https://github.com/{repo}/releases/download/{ref_name}"
              if event_name == "release"
              else ""
          )

          for binary in binaries:
              source = target / f"{binary}{suffix}"
              staged_name = f"{binary}-{label}{suffix}"
              staged = dist / staged_name
              shutil.copyfile(source, staged)
              digest = hashlib.sha256(staged.read_bytes()).hexdigest()
              (dist / f"{staged_name}.sha256").write_text(f"{digest}  {staged_name}\n", encoding="utf-8")

              binaries_info[binary] = {
                  "url": f"{base_url}/{staged_name}" if base_url else staged_name,
                  "sha256": digest,
              }

          manifest_path = dist / f"latest-{label}.json"
          manifest = {
              "version": ref_name,
              "binaries": {
                  label: binaries_info,
              },
          }
          manifest_path.write_text(json.dumps(manifest, indent=2), encoding="utf-8")
          print(f"manifest_path={manifest_path}")
          PY

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/*

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  merge-manifest:
    name: Publish unified latest.json
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge per-platform manifests into latest.json
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import pathlib
          from datetime import datetime, timezone

          ref_name = os.environ.get("GITHUB_REF_NAME") or os.environ["GITHUB_SHA"]
          artifacts = pathlib.Path("artifacts")

          merged = {
              "version": ref_name,
              "build_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "binaries": {},
          }

          for manifest_path in sorted(artifacts.glob("*/latest-*.json")):
              fragment = json.loads(manifest_path.read_text())
              merged["binaries"].update(fragment.get("binaries", {}))

          if not merged["binaries"]:
              raise SystemExit("No per-platform manifests found under artifacts/")

          out = artifacts / "latest.json"
          out.write_text(json.dumps(merged, indent=2), encoding="utf-8")
          print(f"Wrote unified manifest with platforms: {list(merged['binaries'].keys())}")
          PY

      - name: Upload unified manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-manifest
          path: artifacts/latest.json

      - name: Upload unified manifest to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/latest.json

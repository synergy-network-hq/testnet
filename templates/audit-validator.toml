[identity]
node_id = "audit-validator-01"
role = "audit_validator"
role_display = "audit-validator"
address = ""
label = "audit-validator-01"

[role]
compiled_profile = "audit_validator_node"
services = []

[network]
id = 1264
name = "synergy-testnet"
p2p_port = 5622
rpc_port = 5640
ws_port = 5660
max_peers = 100
bootnodes = ["snr://bootstrap@bootnode1.synergyvps.xyz:5620", "snr://bootstrap@bootnode2.synergyvps.xyz:5620", "snr://bootstrap@bootnode3.synergyvps.xyz:5620"]
seed_servers = ["http://seed1.synergyvps.xyz:5621", "http://seed2.synergyvps.xyz:5621", "http://seed3.synergyvps.xyz:5621"]
bootstrap_dns_records = ["_dnsaddr.bootstrap.synergyvps.xyz"]
additional_dial_targets = []
persistent_peers = []

[blockchain]
block_time = 2
max_gas_limit = "0x2fefd8"
chain_id = 1264

[consensus]
algorithm = "Proof of Synergy"
block_time_secs = 2
epoch_length = 1000
min_validators = 3
validator_cluster_size = 5
validator_vote_threshold = 4
max_validators = 100
status_ready_gate_enabled = true
status_ready_min_validators = 3
status_ready_genesis_grace_secs = 0
allow_genesis_status_bypass = false
mesh_settle_secs = 15
leader_timeout_secs = 15
vote_timeout_secs = 8
block_timeout_secs = 30
penalization_enabled = false
synergy_score_decay_rate = 0.05
vrf_enabled = true
vrf_seed_epoch_interval = 1000
max_synergy_points_per_epoch = 100
max_tasks_per_validator = 10

[consensus.reward_weighting]
task_accuracy = 0.5
uptime = 0.3
collaboration = 0.2

[logging]
log_level = "debug"
log_file = "data/logs/audit-validator.log"
enable_console = true
max_file_size = 10485760
max_files = 5

[rpc]
bind_address = "127.0.0.1:5640"
enable_http = true
http_port = 5640
enable_ws = true
ws_port = 5660
enable_grpc = true
grpc_port = 5640
cors_enabled = false
cors_origins = []

[p2p]
listen_address = "0.0.0.0:5622"
public_address = "replace-with-public-host:5622"
node_name = "audit-validator-01"
enable_discovery = true
discovery_port = 5680
discovery_listen_address = "0.0.0.0:5680"
discovery_public_address = "replace-with-public-host:5680"
heartbeat_interval = 10
bootstrap_refresh_secs = 60

[storage]
database = "rocksdb"
path = "data/chain"
enable_pruning = false
pruning_interval = 86400

[node]
bootstrap_only = false
auto_register_validator = false
validator_address = ""
strict_validator_allowlist = true
allowed_validator_addresses = ["synv11qen9x0g9p0f2pqznpqzfrwkrgnsussdwmvs", "synv11s4wc6l4kg4jr0k5meg42cyzxa03cf863srt", "synv11e3ephsarcw6mey0fx5xtnygg2ewegnum4re", "synv11mka64uz049aekwhdvfrq6dvh75d0k7kmdp5", "synv11kguave5fpdpm9hru4acfvw0hcp4fcc7zv9f"]

[telemetry]
enabled = true
metrics_bind = "127.0.0.1:6030"
structured_logs = true
log_level = "debug"

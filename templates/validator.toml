[network]
id = 338639
name = "synergy-testnet-beta"
p2p_port = 5630
rpc_port = 5730
ws_port = 5830
max_peers = 50
# Devnet bootnodes (DNS)
# Format: snr://<validator-address>@<host>:<port>
bootnodes = ["snr://bootstrap@bootnode1.synergynode.xyz:5620", "snr://bootstrap@bootnode2.synergynode.xyz:5620", "snr://bootstrap@bootnode3.synergynode.xyz:5620"]

[blockchain]
block_time = 5
max_gas_limit = "0x2fefd8"
chain_id = 338639

[consensus]
algorithm = "Proof of Synergy"
block_time_secs = 5
epoch_length = 30000
validator_cluster_size = 4
max_validators = 4
synergy_score_decay_rate = 0.05
vrf_enabled = true
vrf_seed_epoch_interval = 1000
max_synergy_points_per_epoch = 100
max_tasks_per_validator = 10

[consensus.reward_weighting]
task_accuracy = 0.5
uptime = 0.3
collaboration = 0.2

[logging]
log_level = "info"
log_file = "data/logs/validator.log"
enable_console = true
max_file_size = 10485760
max_files = 5

[rpc]
enable_http = true
http_port = 5730
enable_ws = true
ws_port = 5830
enable_grpc = true
grpc_port = 5730
cors_enabled = false
cors_origins = []

[p2p]
listen_address = "0.0.0.0:5630"
public_address = "127.0.0.1:5630"
node_name = "validator-node-01"
enable_discovery = false
discovery_port = 5930
heartbeat_interval = 30

[storage]
database = "rocksdb"
path = "data/chain"
enable_pruning = false
pruning_interval = 86400

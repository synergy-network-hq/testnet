# Canonical Testnet-Beta RPC gateway reverse proxy.
# Deploy this file on the public RPC host and enable it in nginx.

upstream testbeta_rpc_http {
  server 127.0.0.1:5646;
}

upstream testbeta_rpc_ws {
  server 127.0.0.1:5666;
}

server {
  listen 80;
  server_name testbeta-core-rpc.synergy-network.io testbeta-core-ws.synergy-network.io;
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
    default_type "text/plain";
    try_files $uri =404;
  }
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name testbeta-core-rpc.synergy-network.io;
  ssl_certificate /etc/letsencrypt/live/testbeta-core-rpc.synergy-network.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/testbeta-core-rpc.synergy-network.io/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  location = /healthz {
    return 200 "ok\n";
  }

  location = /metrics/node-rpc {
    allow 209.145.50.9;
    deny all;
    proxy_pass http://127.0.0.1:6031/metrics;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location = /metrics/node-exporter {
    allow 209.145.50.9;
    deny all;
    proxy_pass http://127.0.0.1:9100/metrics;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location / {
    proxy_pass http://testbeta_rpc_http;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    add_header Access-Control-Allow-Headers "Content-Type";
  }
}

server {
  listen 443 ssl http2;
  server_name testbeta-core-ws.synergy-network.io;
  ssl_certificate /etc/letsencrypt/live/testbeta-core-rpc.synergy-network.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/testbeta-core-rpc.synergy-network.io/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  location / {
    proxy_pass http://testbeta_rpc_ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }
}

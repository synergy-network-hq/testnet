# Canonical Testnet-Beta Atlas and explorer reverse proxy.
# Deploy this file on the public explorer host and enable it in nginx.

upstream testbeta_atlas_api {
  server 127.0.0.1:3020;
}

upstream testbeta_indexer_ws {
  server 127.0.0.1:5667;
}

server {
  listen 80;
  server_name testbeta-explorer.synergy-network.io testbeta-atlas-api.synergy-network.io testbeta-indexer.synergy-network.io;
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
    default_type "text/plain";
    try_files $uri =404;
  }
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name testbeta-explorer.synergy-network.io;
  ssl_certificate /etc/letsencrypt/live/testbeta-explorer.synergy-network.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/testbeta-explorer.synergy-network.io/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  root /opt/synergy/testbeta/indexer-explorer/explorer-app/dist;
  index index.html;

  location = /metrics/node-exp {
    allow 209.145.50.9;
    deny all;
    proxy_pass http://127.0.0.1:6030/metrics;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location /api/ {
    proxy_pass http://testbeta_atlas_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  location = /healthz {
    proxy_pass http://testbeta_atlas_api/healthz;
  }

  location = /readyz {
    proxy_pass http://testbeta_atlas_api/readyz;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

server {
  listen 443 ssl http2;
  server_name testbeta-atlas-api.synergy-network.io;
  ssl_certificate /etc/letsencrypt/live/testbeta-explorer.synergy-network.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/testbeta-explorer.synergy-network.io/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  location / {
    proxy_pass http://testbeta_atlas_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}

server {
  listen 443 ssl http2;
  server_name testbeta-indexer.synergy-network.io;
  ssl_certificate /etc/letsencrypt/live/testbeta-explorer.synergy-network.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/testbeta-explorer.synergy-network.io/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  location / {
    proxy_pass http://testbeta_indexer_ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }
}

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: synergy_rpc_exporter
    static_configs:
      - targets: ["synergy-rpc-exporter:9168"]

  - job_name: monitoring_host_node_exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: testnet-beta_node_exporters
    static_configs:
      - targets:
          - "10.50.0.1:9100"
          - "10.50.0.2:9100"
          - "10.50.0.3:9100"
          - "10.50.0.4:9100"
          - "10.50.0.5:9100"
          - "10.50.0.6:9100"
          - "10.50.0.7:9100"
          - "10.50.0.8:9100"
          - "10.50.0.9:9100"
          - "10.50.0.10:9100"
          - "10.50.0.11:9100"
          - "10.50.0.12:9100"
          - "10.50.0.13:9100"
          - "10.50.0.14:9100"
          - "10.50.0.15:9100"

version: "3.9"

services:
  synergy-rpc-exporter:
    image: python:3.12-slim
    container_name: synergy-rpc-exporter
    command: ["python", "/app/synergy_rpc_exporter.py"]
    environment:
      SYNERGY_INVENTORY_FILE: /config/node-inventory.csv
      SYNERGY_EXPORTER_PORT: "9168"
      SYNERGY_RPC_TIMEOUT_SECONDS: "3.0"
    volumes:
      - ./exporters/synergy_rpc_exporter.py:/app/synergy_rpc_exporter.py:ro
      - ../node-inventory.csv:/config/node-inventory.csv:ro
    ports:
      - "9168:9168"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: synergy-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=14d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - synergy-rpc-exporter
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    container_name: synergy-loki
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    container_name: synergy-promtail
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - ../../../data/testbeta15:/var/log/synergy:ro
      - /var/log:/var/log/host:ro
    depends_on:
      - loki
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: synergy-node-exporter
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: synergy-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  prometheus_data:
  loki_data:
  grafana_data:

[network]
node_name = "bootnode1-validator"
listen_address = "0.0.0.0:5620"
public_address = "bootnode1.synergyvps.xyz:5620"
# Bootnode1 - First validator node (other nodes will connect to this)
bootnodes = []
p2p_port = 5620

[validator]
# Validator identity - using generated FN-DSA-1024 keys
address = "synv11lylxla8qjcrk3ef8gjlyyhew3z4mjswwwsn6zv"
identity_file = "config/bootnode1/identity.json"
enabled = true
name = "Synergy Testnet Beta Bootnode 1"
cluster_id = "syngrp116xlcwtcuwd8cdkqrftdww5dpqvm699uanux4mc"

[consensus]
algorithm = "PoSy"
block_time_secs = 3
max_validators = 5
synergetic_mode = true
vrf_enabled = true
vrf_seed_interval = 100

[logging]
log_level = "info"
log_file = "logs/bootnode1.log"
enable_console = true

[rpc]
http_port = 5640
ws_port = 5660
enable_cors = true
external_http = "https://testbeta-core-rpc.synergy-network.io"
external_ws = "wss://testbeta-core-ws.synergy-network.io"

[node]
role = "validator"
enable_rpc = true
enable_metrics = true
metrics_port = 6030

[p2p]
discovery_port = 5680

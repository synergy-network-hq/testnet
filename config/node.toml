[network]
name = "synergy-testbeta"
chain_id = 338639
p2p_port = 38638
rpc_port = 48638
ws_port = 58638

[node]
role = "validator"
enable_rpc = true
enable_metrics = true
metrics_port = 9090

[logging]
log_level = "info"
enable_console = true
log_file = "logs/validator.log"
max_file_size = 10485760
max_files = 5

[consensus]
algorithm = "proof-of-synergy"
vrf_enabled = true
vrf_seed_interval = 100
cluster_size = 3

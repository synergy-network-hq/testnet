[network]
name = "synergy-testnet-beta"
chain_id = 338639
p2p_port = 5630
rpc_port = 5730
ws_port = 5830

[node]
role = "validator"
enable_rpc = true
enable_metrics = true
metrics_port = 6030

[logging]
log_level = "info"
enable_console = true
log_file = "logs/validator.log"
max_file_size = 10485760
max_files = 5

[consensus]
algorithm = "proof-of-synergy"
vrf_enabled = true
vrf_seed_interval = 100
cluster_size = 3

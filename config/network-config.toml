[network]
id = 338639
name = "Synergy Testnet Beta"
p2p_port = 5620
rpc_port = 5730
ws_port = 5830
max_peers = 50
bootnodes = [
  "snr://bootstrap@bootnode1.synergynode.xyz:5620",
  "snr://bootstrap@bootnode2.synergynode.xyz:5620",
  "snr://bootstrap@bootnode3.synergynode.xyz:5620"
]

[rpc]
bind_address = "0.0.0.0:5730"
external_http = "https://testbeta-core-rpc.synergy-network.io"
external_ws = "wss://testbeta-core-ws.synergy-network.io"

[network.listen]
p2p = "0.0.0.0:5620"
rpc = "0.0.0.0:5730"
ws  = "0.0.0.0:5830"

[blockchain]
block_time = 5
max_gas_limit = "0x2fefd8"
chain_id = 338639

[storage]
database = "rocksdb"
path = "data/chain"
enable_pruning = true
pruning_interval = 86400

[api]
enable_http = true
http_port = 5730
enable_ws = true
ws_port = 5830
enable_grpc = true
grpc_port = 50051

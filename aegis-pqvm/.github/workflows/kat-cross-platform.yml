name: PQVM Cross-Platform Deterministic KAT

on:
  push:
    branches: [main, develop]
    paths:
      - 'aegis-pqvm/tests/kat*.rs'
      - 'aegis-pqvm/tests/kats/**'
      - 'aegis-pqvm/scripts/run_deterministic_kat.sh'
      - 'aegis-pqvm/.github/workflows/kat-cross-platform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'aegis-pqvm/tests/kat*.rs'
      - 'aegis-pqvm/tests/kats/**'
      - 'aegis-pqvm/scripts/run_deterministic_kat.sh'
      - 'aegis-pqvm/.github/workflows/kat-cross-platform.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kat:
    name: KAT (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      AEGIS_KAT_SEED: aegis-pqvm-kat-seed-v1
      AEGIS_KAT_MAX_CASES: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run deterministic KAT replay
        shell: bash
        run: |
          cd aegis-pqvm
          ./scripts/run_deterministic_kat.sh

      - name: Upload KAT replay logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pqvm-kat-replay-${{ matrix.os }}
          path: |
            aegis-pqvm/artifacts/acvp/replay_logs/*
            aegis-pqvm/artifacts/acvp/result_corpus/*
